syntax = "proto3";

package followships.api.v1;

import "followships/api/v1/follow_request.proto";
import "followships/api/v1/followees.proto";
import "followships/api/v1/followers.proto";
import "followships/api/v1/followship_counts.proto";
import "followships/api/v1/followship_exists_request.proto";
import "followships/api/v1/get_followees_request.proto";
import "followships/api/v1/get_followers_request.proto";
import "followships/api/v1/get_followship_counts_request.proto";
import "followships/api/v1/unfollow_request.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";
import "grafbase/options.proto";

service FollowshipsAPIService {
  option (grafbase.graphql.subgraph_name) = "followships";
  option (grafbase.graphql.default_to_query_fields) = true;

  rpc GetFollowshipCounts(GetFollowshipCountsRequest) returns (FollowshipCounts) {}

  rpc Follow(FollowRequest) returns (google.protobuf.Empty) {
    option (grafbase.graphql.is_mutation) = true;
  }

  rpc Unfollow(UnfollowRequest) returns (google.protobuf.Empty) {
    option (grafbase.graphql.is_mutation) = true;
  }

  rpc GetFollowers(GetFollowersRequest) returns (Followers) {}
  rpc GetFollowees(GetFolloweesRequest) returns (Followees) {}

  rpc FollowshipExists(FollowshipExistsRequest) returns (google.protobuf.BoolValue) {}
}
