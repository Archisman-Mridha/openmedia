syntax = "proto3";

package profiles.api.v1;

import "grafbase/options.proto";
import "profiles/api/v1/get_profile_by_id_request.proto";
import "profiles/api/v1/get_profile_preview_by_id_request.proto";
import "profiles/api/v1/profile.proto";
import "profiles/api/v1/profile_preview.proto";
import "profiles/api/v1/profile_previews.proto";
import "profiles/api/v1/search_profiles_request.proto";

service ProfilesAPIService {
  option (grafbase.graphql.subgraph_name) = "profiles";
  option (grafbase.graphql.default_to_query_fields) = true;

  rpc GetProfilePreviewByID(GetProfilePreviewByIDRequest) returns (ProfilePreview) {
    option (grafbase.graphql.lookup) = {};
    option (grafbase.graphql.argument_is) = "{ id: id }";
  }

  rpc GetProfileByID(GetProfileByIDRequest) returns (Profile) {
    option (grafbase.graphql.lookup) = {};
    option (grafbase.graphql.argument_is) = "{ id: id }";
  }

  rpc SearchProfiles(SearchProfilesRequest) returns (ProfilePreviews) {}
}
