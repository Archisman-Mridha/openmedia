syntax = "proto3";

package posts.api.v1;

import "posts/api/v1/create_post_request.proto";
import "posts/api/v1/create_post_response.proto";
import "posts/api/v1/get_post_by_id_request.proto";
import "posts/api/v1/get_posts_by_author_request.proto";
import "posts/api/v1/get_posts_by_ids_request.proto";
import "posts/api/v1/post.proto";
import "posts/api/v1/posts.proto";
import "grafbase/options.proto";

service PostsAPIService {
  option (grafbase.graphql.subgraph_name) = "posts";
  option (grafbase.graphql.default_to_query_fields) = true;

  rpc CreatePost(CreatePostRequest) returns (CreatePostResponse) {
    option (grafbase.graphql.is_mutation) = true;
  }

  rpc GetPostsByAuthor(GetPostsByAuthorRequest) returns (Posts) {}

  rpc GetPostByID(GetPostByIDRequest) returns (Post) {
    option (grafbase.graphql.lookup) = {};
    option (grafbase.graphql.argument_is) = "{ id: id }";
  }

  rpc GetPostsByIDs(GetPostsByIDsRequest) returns (Posts) {}
}
