apiVersion: v1
data:
  flowlogs.yaml: |
    flowLogs:
      - fieldMasks:
        - source.namespace
        - source.pod_name
        - destination.namespace
        - destination.pod_name
        - drop_reason_desc
        filePath: /var/run/cilium/hubble/dropped-packet-flows.log
        includeFilters:
        - event_type:
          - type: 1
        name: dropped-packet-flows
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/managed-by: Helmraiser
    app.tanka.grafana.com: cilium
  name: cilium-flowlog-config
  namespace: cilium
