apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app: ebs-csi-controller
    app.kubernetes.io/managed-by: Helmraiser
    app.tanka.grafana.com: aws-ebs-csi-driver
  name: ebs-csi-controller
  namespace: aws
spec:
  endpoints:
    - interval: 15s
      path: /metrics
      targetPort: 3301
  namespaceSelector:
    matchNames:
      - aws
  selector:
    matchLabels:
      app: ebs-csi-controller
