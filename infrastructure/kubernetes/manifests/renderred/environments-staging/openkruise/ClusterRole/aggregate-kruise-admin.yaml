apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/managed-by: Helmraiser
    app.tanka.grafana.com: openkruise
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
  name: aggregate-kruise-admin
rules:
  - apiGroups:
      - apps.kruise.io
    resources:
      - resourcedistributions/status
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps.kruise.io
    resources:
      - resourcedistributions
    verbs:
      - get
      - list
      - watch
      - create
      - delete
      - deletecollection
      - patch
      - update
