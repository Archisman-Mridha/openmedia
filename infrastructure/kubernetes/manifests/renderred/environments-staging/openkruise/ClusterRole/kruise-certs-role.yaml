apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/managed-by: Helmraiser
    app.tanka.grafana.com: openkruise
  name: kruise-certs-role
rules:
- apiGroups:
  - admissionregistration.k8s.io
  resourceNames:
  - kruise-mutating-webhook-configuration
  resources:
  - mutatingwebhookconfigurations
  verbs:
  - patch
  - update
- apiGroups:
  - admissionregistration.k8s.io
  resourceNames:
  - kruise-validating-webhook-configuration
  resources:
  - validatingwebhookconfigurations
  verbs:
  - patch
  - update
- apiGroups:
  - apiextensions.k8s.io
  resourceNames:
  - statefulsets.apps.kruise.io
  - sidecarsets.apps.kruise.io
  - daemonsets.apps.kruise.io
  resources:
  - customresourcedefinitions
  verbs:
  - update
  - watch
