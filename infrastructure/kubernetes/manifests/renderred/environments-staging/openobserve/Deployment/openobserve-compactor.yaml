apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: openobserve
    app.kubernetes.io/managed-by: Helmraiser
    app.kubernetes.io/name: openobserve
    app.kubernetes.io/version: v0.80.2
    app.tanka.grafana.com: openobserve
    helm.sh/chart: openobserve-0.80.3
  name: openobserve-compactor
  namespace: openobserve
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: openobserve
      app.kubernetes.io/name: openobserve
      role: compactor
  template:
    metadata:
      annotations:
        checksum/generic-config: 4be8404da77b7953b90361835d5c71fe1eba39caaf9377e4128f4b33fab90c7d
        checksum/specific-config: b07dce4a7f4f2d9346622d426147b6214208d1474f78c912c340acb8d700db0e
      labels:
        app.kubernetes.io/instance: openobserve
        app.kubernetes.io/name: openobserve
        role: compactor
    spec:
      containers:
      - env:
        - name: ZO_NODE_ROLE
          value: compactor
        envFrom:
        - configMapRef:
            name: openobserve
        - configMapRef:
            name: openobserve-compactor
        - secretRef:
            name: openobserve-auth-credentials
        image: o2cr.ai/openobserve/openobserve-enterprise:v0.80.2
        imagePullPolicy: IfNotPresent
        name: openobserve-compactor
        ports:
        - containerPort: 5080
          name: http
        - containerPort: 5081
          name: grpc
        resources: {}
        securityContext: {}
      initContainers:
      - command:
        - sh
        - -c
        - ' until nc -zv openobserve-nats 4222; do echo "Waiting for NATS to be ready...";
          sleep 2; done; '
        image: public.ecr.aws/docker/library/busybox:1.36.1
        name: check-nats
        resources:
          limits:
            cpu: 50m
            memory: 50Mi
      securityContext:
        fsGroup: 2000
        runAsGroup: 3000
        runAsNonRoot: true
        runAsUser: 10000
      serviceAccountName: openobserve
