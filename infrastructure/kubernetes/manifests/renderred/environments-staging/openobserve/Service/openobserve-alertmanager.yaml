apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: openobserve
    app.kubernetes.io/managed-by: Helmraiser
    app.kubernetes.io/name: openobserve
    app.kubernetes.io/version: v0.80.2
    app.tanka.grafana.com: openobserve
    helm.sh/chart: openobserve-0.80.3
    prometheus.io/scrape: "true"
    role: alertmanager
  name: openobserve-alertmanager
  namespace: openobserve
spec:
  ports:
  - name: http
    port: 5080
    protocol: TCP
    targetPort: http
  - name: grpc
    port: 5081
    protocol: TCP
    targetPort: grpc
  - name: reportserver
    port: 5082
    protocol: TCP
    targetPort: reportserver
  selector:
    app.kubernetes.io/instance: openobserve
    app.kubernetes.io/name: openobserve
    role: alertmanager
