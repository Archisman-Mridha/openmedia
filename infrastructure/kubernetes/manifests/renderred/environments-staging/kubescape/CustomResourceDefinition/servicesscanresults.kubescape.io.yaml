                      nullable: true
                      type: boolean
                    port:
                      type: integer
                    presentationLayer:
                      type: string
                    protocol:
                      type: string
                    sessionLayer:
                      type: string
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
