apiVersion: v1
data:
  cronjobTemplate: |-
    apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: kubevuln-scheduler
      namespace: kubescape
      labels:
        app: kubevuln-scheduler
        tier: ks-control-plane
        kubescape.io/tier: "core"
        armo.tier: "vuln-scan"
    spec:
      schedule: "0 0 * * *"
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 1
      jobTemplate:
        spec:
          template:
            metadata:
              labels:
                armo.tier: "vuln-scan"
                kubescape.io/tier: "core"
            spec:
              securityContext:
                seccompProfile:
                  type: RuntimeDefault
              containers:
              - name: kubevuln-scheduler
                image: "quay.io/kubescape/http-request:v0.2.19"
                imagePullPolicy: IfNotPresent
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  runAsNonRoot: true
                  runAsUser: 100
                resources:
                  limits:
                    cpu: 10m
                    memory: 20Mi
                  requests:
                    cpu: 1m
                    memory: 10Mi
                args:
                  - -method=post
                  - -scheme=http
                  - -host=operator:4002
                  - -path=v1/triggerAction
                  - -headers=Content-Type:application/json
                  - -path-body=/home/ks/request-body.json
                volumeMounts:
                  - name: "request-body-volume"
                    mountPath: /home/ks/request-body.json
                    subPath: request-body.json
                    readOnly: true
              restartPolicy: Never
              serviceAccountName: kubevuln
              automountServiceAccountToken: false
              nodeSelector:
                kubernetes.io/os: linux
              affinity:
              tolerations:
              volumes:
                - name: "request-body-volume" # placeholder
                  configMap:
                    name: kubevuln-scheduler
kind: ConfigMap
metadata:
  labels:
    app: ks-cloud-config
    app.kubernetes.io/component: ks-cloud-config
    app.kubernetes.io/instance: kubescape
    app.kubernetes.io/managed-by: Helmraiser
    app.kubernetes.io/name: kubescape-operator
    app.kubernetes.io/part-of: kubescape
    app.kubernetes.io/version: 1.40.2
    app.tanka.grafana.com: kubescape
    helm.sh/chart: kubescape-operator-1.40.2
    kubescape.io/ignore: "true"
    kubescape.io/tier: core
    tier: ks-control-plane
  name: kubevuln-cronjob-template
  namespace: kubescape
