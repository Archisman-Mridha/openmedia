apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app: node-agent
    app.kubernetes.io/component: node-agent
    app.kubernetes.io/instance: kubescape
    app.kubernetes.io/managed-by: Helmraiser
    app.kubernetes.io/name: kubescape-operator
    app.kubernetes.io/part-of: kubescape
    app.kubernetes.io/version: 1.40.2
    app.tanka.grafana.com: kubescape
    helm.sh/chart: kubescape-operator-1.40.2
    kubescape.io/ignore: "true"
    tier: ks-control-plane
  name: node-agent
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - namespaces
      - configmaps
    verbs:
      - get
      - watch
      - list
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - watch
      - list
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - watch
      - list
  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - watch
      - list
  - apiGroups:
      - apps
    resources:
      - deployments
      - daemonsets
      - statefulsets
      - replicasets
    verbs:
      - get
      - watch
      - list
  - apiGroups:
      - spdx.softwarecomposition.kubescape.io
    resources:
      - applicationprofiles
      - networkneighborhoods
    verbs:
      - get
      - watch
      - list
  - apiGroups:
      - kubescape.io
    resources:
      - seccompprofiles
    verbs:
      - get
      - watch
      - list
  - apiGroups:
      - spdx.softwarecomposition.kubescape.io
    resources:
      - containerprofiles
      - sbomsyfts
    verbs:
      - create
      - get
      - update
      - watch
      - list
      - patch
  - apiGroups:
      - kubescape.io
    resources:
      - runtimerulealertbindings
    verbs:
      - list
      - watch
  - apiGroups:
      - kubescape.io
    resources:
      - operatorcommands
    verbs:
      - get
      - watch
      - list
  - apiGroups:
      - kubescape.io
    resources:
      - operatorcommands/status
    verbs:
      - get
      - watch
      - list
      - update
      - patch
  - apiGroups:
      - events.k8s.io
