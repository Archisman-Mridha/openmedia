      - events
    verbs:
      - create
      - patch
      - get
  - apiGroups:
      - kubescape.io
    resources:
      - rules
    verbs:
      - list
      - watch
  - apiGroups:
      - hostdata.kubescape.cloud
    resources:
      - osreleasefiles
      - kernelversions
      - linuxsecurityhardeningstatuses
      - openportslists
      - linuxkernelvariables
      - kubeletinfos
      - kubeproxyinfos
      - controlplaneinfos
      - cloudproviderinfos
      - cniinfos
    verbs:
      - create
      - get
      - update
      - patch
      - list
      - watch
