---
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  name: general
  labels:
    kops.k8s.io/cluster: staging.openmedia
spec:
  role: Node
  minSize: 1
  maxSize: 3
  machineType: t4g.medium
  # The default volume size for Masters is 64 GB, while the default volume size for a node is
  # 128 GB.
  rootVolume:
    size: 10
    type: gp3
    encryption: true
  subnets:
    - private-a
    - private-b
    - private-c
